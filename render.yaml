services:
  - type: web
    name: nyc-vc-deals
    runtime: python
    pythonVersion: "3.11"
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api_server:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true

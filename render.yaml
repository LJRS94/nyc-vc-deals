services:
  - type: web
    name: nyc-vc-deals
    runtime: python
    pythonVersion: "3.11"
    plan: standard
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /health
    disk:
      name: vc-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_PATH
        value: /var/data/nyc_vc_deals.db

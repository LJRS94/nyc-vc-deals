services:
  - type: web
    name: nyc-vc-deals
    runtime: python
    pythonVersion: "3.11"
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -c "from database import restore_if_empty, init_db; restore_if_empty(); init_db()" && gunicorn api_server:app --bind 0.0.0.0:$PORT --workers 2 --threads 2 --timeout 120
    healthCheckPath: /health
    disk:
      name: vc-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_PATH
        value: /var/data/nyc_vc_deals.db

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NYC VC Deal Intelligence</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0b0f; color: #c8cad0; font-family: 'Instrument Sans', system-ui, sans-serif; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-thumb { background: #2a2b3d; border-radius: 3px; }
    input::placeholder { color: #33344a; }
    button { font-family: inherit; border: none; cursor: pointer; background: transparent; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .fu { animation: fadeUp .18s ease-out; }
    table { width: 100%; border-collapse: collapse; }
    th { position: sticky; top: 0; z-index: 3; background: #101118; cursor: pointer; user-select: none;
         padding: 8px 10px; font-size: 9.5px; font-weight: 700; text-transform: uppercase;
         letter-spacing: 1.2px; color: #52536b; white-space: nowrap; border-bottom: 2px solid #191a2e; }
    th.active { color: #c4b5fd; border-bottom-color: #7c3aed; }
    td { padding: 8px 10px; border-bottom: 1px solid #13141f; }
    tr.stripe { background: #0c0d13; }
    tr:hover td { background: #13141f !important; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 10px; font-weight: 600; white-space: nowrap; }
    .mono { font-family: 'IBM Plex Mono', monospace; }
    .green { color: #34d399; }
    .purple { color: #a78bfa; }
    .muted { color: #52536b; }
    .link { color: #a78bfa; font-weight: 600; cursor: pointer; }
    .link:hover { text-decoration: underline; }
    .header { display: flex; align-items: center; gap: 16px; padding: 10px 20px; border-bottom: 1px solid #191a2e; background: #0c0d13; }
    .filters { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; padding: 8px 20px; border-bottom: 1px solid #191a2e; background: #0c0d13; }
    .pill { padding: 2px 9px; border-radius: 3px; font-size: 10.5px; font-weight: 500; border: 1px solid #1a1b2e; }
    .pill.on { font-weight: 700; }
    .tab { padding: 5px 14px; border-radius: 4px; font-size: 11.5px; font-weight: 600; }
    .tab.on { background: #1e1f35; color: #b4a7f5; }
    .tab:not(.on) { color: #52536b; }
    .kpi { background: #101118; border: 1px solid #191a2e; border-radius: 6px; padding: 10px 16px; min-width: 90px; }
    .kpi-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #444; }
    .kpi-val { font-size: 20px; font-weight: 700; margin-top: 2px; }
    .expand-row td { padding: 10px 10px 14px 28px; background: #111220; border-bottom: 1px solid #1e1f30; }
    .sidebar-item { padding: 12px 16px; border-bottom: 1px solid #13141f; cursor: pointer; transition: background .12s; }
    .sidebar-item:hover { background: #0e0f18; }
    .sidebar-item.on { background: #141520; }
    .empty { display: flex; align-items: center; justify-content: center; height: 100%; color: #2a2b3d; text-align: center; }
    .loading { display: flex; align-items: center; justify-content: center; height: 100vh; color: #52536b; font-size: 14px; }
    .user-menu { position: relative; }
    .user-initial { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border-color .12s; display: flex; align-items: center; justify-content: center; background: #7c3aed30; color: #a78bfa; font-weight: 700; font-size: 12px; }
    .user-initial:hover { border-color: #7c3aed; }
    .user-dropdown { position: absolute; right: 0; top: 36px; background: #141520; border: 1px solid #1e1f35; border-radius: 6px; min-width: 180px; z-index: 100; box-shadow: 0 8px 24px rgba(0,0,0,.4); }
    .user-dropdown a, .user-dropdown button { display: block; width: 100%; padding: 8px 14px; text-align: left; color: #bbb; font-size: 12px; border: none; background: none; cursor: pointer; font-family: inherit; text-decoration: none; }
    .user-dropdown a:hover, .user-dropdown button:hover { background: #1e1f35; color: #eee; }
    .star-btn { background: none; border: none; cursor: pointer; font-size: 15px; padding: 0 2px; transition: transform .1s; }
    .star-btn:hover { transform: scale(1.2); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200; display: flex; align-items: center; justify-content: center; }
    .modal { background: #141520; border: 1px solid #1e1f35; border-radius: 8px; padding: 24px; min-width: 420px; max-width: 500px; max-height: 80vh; overflow: auto; box-shadow: 0 12px 40px rgba(0,0,0,.5); }
    .modal h3 { font-size: 15px; font-weight: 700; color: #eee; margin-bottom: 16px; }
    .modal label { display: flex; align-items: center; gap: 8px; padding: 3px 0; font-size: 12px; color: #bbb; cursor: pointer; }
    .modal label input[type="checkbox"] { accent-color: #7c3aed; }
    .modal-section { margin-bottom: 16px; }
    .modal-section-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #555; margin-bottom: 6px; }
    .modal input[type="number"] { width: 100px; padding: 4px 8px; border-radius: 4px; border: 1px solid #1e1f35; background: #0c0d13; color: #ddd; font-size: 12px; font-family: 'IBM Plex Mono', monospace; }
    .modal-btn { padding: 6px 16px; border-radius: 4px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; }
    .modal-btn-primary { background: #7c3aed; color: #fff; }
    .modal-btn-primary:hover { background: #6d28d9; }
    .modal-btn-secondary { background: #1e1f35; color: #bbb; }
    .folder-badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; background: #1e1f35; color: #888; }
    .chart-bar { height: 3px; background: #191a2e; border-radius: 2px; overflow: hidden; margin-top: 6px; }
    .chart-fill { height: 100%; border-radius: 2px; }
    .investor-card { background: #101118; border: 1px solid #191a2e; border-radius: 5px; padding: 8px 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: border-color .12s; }
    .investor-card:hover { border-color: #7c3aed30; }
    /* Mobile responsiveness */
    @media (max-width: 768px) {
      .header { flex-wrap: wrap; gap: 8px; padding: 8px 12px; }
      .header > div:nth-child(2) { order: 5; width: 100%; max-width: 100% !important; }
      .filters { overflow-x: auto; flex-wrap: nowrap; padding: 6px 12px; }
      .sidebar-fixed { width: 100% !important; max-height: 200px; border-right: none !important; border-bottom: 1px solid #191a2e; }
      .expand-row td > div { grid-template-columns: 1fr !important; }
      .modal { min-width: auto !important; max-width: 95vw !important; margin: 10px; }
      table { font-size: 11px !important; }
      td, th { padding: 6px 6px !important; }
    }
    .chart-container { background: #101118; border: 1px solid #191a2e; border-radius: 6px; padding: 16px; margin-bottom: 16px; }
    .export-btn { padding: 4px 12px; border-radius: 4px; font-size: 10.5px; font-weight: 600; border: 1px solid #7c3aed40; background: #7c3aed14; color: #a78bfa; cursor: pointer; }
    .export-btn:hover { background: #7c3aed28; }
    .compare-card { background: #101118; border: 1px solid #191a2e; border-radius: 6px; padding: 16px; flex: 1; min-width: 280px; }
    .source-bar { display: flex; align-items: center; gap: 8px; padding: 6px 0; }
    .source-fill { height: 6px; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback, useRef } = React;

    /* ── Helpers ── */
    const $=v=>{if(!v&&v!==0)return"—";if(v>=1e9)return`$${(v/1e9).toFixed(1)}B`;if(v>=1e6)return`$${(v/1e6).toFixed(1)}M`;if(v>=1e3)return`$${(v/1e3).toFixed(0)}K`;return`$${v}`;};
    const SC={"Pre-Seed":"#f97316",Seed:"#22c55e","Series A":"#6366f1","Series B":"#ec4899","Series C+":"#a855f7",Unknown:"#6b7280"};
    const CC={"AI / Machine Learning":"#818cf8",Fintech:"#34d399","Health & Biotech":"#f472b6",Cybersecurity:"#fb923c","Web3 / Crypto":"#a78bfa","Real Estate / Proptech":"#2dd4bf","Insurance / Insurtech":"#f59e0b","HR / Future of Work":"#38bdf8","Developer Tools":"#4ade80","Media & Entertainment":"#e879f9","SaaS / Enterprise":"#60a5fa","Consumer / D2C":"#fb7185","Climate / Cleantech":"#84cc16","Marketplace":"#fb923c","Legal Tech":"#94a3b8","Food & Agriculture":"#a3e635","Hardware / Robotics":"#f97316","Education / Edtech":"#c084fc","Logistics / Supply Chain":"#22d3ee","Gaming":"#fb7185","Quantum Computing":"#67e8f9","Space Tech":"#fbbf24","Other":"#6b7280"};
    const SRCS = {alleywatch:"🗽 AlleyWatch",sec_filing:"📋 SEC",news_article:"📰 News",de_filing:"🏛 Delaware",google_news:"🔍 Google",other:"📄 Other",ny_dos:"🏙 NY DOS"};
    const dealCompleteness = d => { let f=0,t=5; if(d.amount_usd)f++; if(d.description)f++; if(d.category)f++; if(d.date_announced)f++; if((d.firms||[]).length)f++; return Math.round(f/t*100); };
    const srcIcon = s => (SRCS[s]||"📄").split(" ")[0];

    function Badge({t,c}) { return <span className="badge" style={{background:(c||"#555")+"18",color:c||"#999",border:`1px solid ${(c||"#555")}25`}}>{t}</span>; }

    function KPIRow({items}) {
      return <div style={{display:"flex",gap:14,marginBottom:16,flexWrap:"wrap"}}>
        {items.map(k => <div key={k.l} className="kpi"><div className="kpi-label">{k.l}</div><div className="kpi-val mono" style={{color:k.c}}>{k.v}</div></div>)}
      </div>;
    }

    function FirmDealTable({deals, limit, showDesc, fullDate}) {
      const shown = limit ? deals.slice(0, limit) : deals;
      return <table style={{fontSize:12}}><thead><tr style={{borderBottom:"2px solid #191a2e"}}>
        {["Company","Amount","Stage","Sector","Role","Date"].map(h=>
          <th key={h} style={{cursor:"default",textAlign:h==="Amount"?"right":"left"}}>{h}</th>)}
      </tr></thead><tbody>
        {shown.map((d,i) =>
          <tr key={d.id} className={i%2?"":"stripe"}>
            <td><span style={{fontWeight:600,color:"#eee"}}>{d.company_name}</span>
              {showDesc && d.company_description && <div style={{fontSize:10,color:"#4a4b60",marginTop:1}}>{d.company_description}</div>}
            </td>
            <td style={{textAlign:"right"}} className="mono green"><b>{$(d.amount_usd)}</b></td>
            <td><Badge t={d.stage} c={SC[d.stage]} /></td>
            <td style={{color:CC[d.category],fontSize:11}}>{d.category}</td>
            <td><Badge t={d.role==="lead"?"★ Lead":"Co-Inv"} c={d.role==="lead"?"#a78bfa":"#4a4b60"} /></td>
            <td className="mono muted" style={{fontSize:10.5}}>{fullDate ? (d.date_announced||"") : (d.date_announced||"").slice(5)}</td>
          </tr>
        )}
      </tbody></table>;
    }

    function PortfolioTable({companies, showFirm, linkedDeals}) {
      return <table style={{fontSize:12}}><thead><tr style={{borderBottom:"2px solid #191a2e"}}>
        <th style={{cursor:"default"}}>Company</th>
        {showFirm && <th style={{cursor:"default"}}>Firm</th>}
        <th style={{cursor:"default"}}>Sector</th>
        <th style={{cursor:"default"}}>Lead Partner</th>
        {linkedDeals && <th style={{cursor:"default"}}>Funding</th>}
        <th style={{cursor:"default"}}>Website</th>
      </tr></thead><tbody>
        {companies.map((c,i) => {
          const deal = linkedDeals && linkedDeals[(c.company_name||"").toLowerCase()];
          return <tr key={c.id||i} className={i%2?"":"stripe"}>
            <td><div style={{fontWeight:600,color:"#eee"}}>{c.company_name}</div>
              {c.description && <div style={{fontSize:10.5,color:"#4a4b60",marginTop:1,maxWidth:300,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.description}</div>}
            </td>
            {showFirm && <td><span style={{color:"#a78bfa",fontSize:11.5,fontWeight:500}}>{c.firm_name}</span></td>}
            <td style={{color:"#777",fontSize:11}}>{c.sector||"—"}</td>
            <td style={{color:"#888",fontSize:11}}>{c.lead_partner||"—"}</td>
            {linkedDeals && <td>
              {deal ? <span style={{display:"flex",gap:4,alignItems:"center"}}>
                <Badge t={deal.stage} c={SC[deal.stage]} />
                {deal.amount_usd && <span className="mono green" style={{fontSize:10.5}}>{$(deal.amount_usd)}</span>}
              </span> : <span className="muted" style={{fontSize:10}}>—</span>}
            </td>}
            <td>{c.company_website
              ? <a href={c.company_website.startsWith("http")?c.company_website:"https://"+c.company_website} target="_blank" rel="noopener"
                  style={{color:"#6366f1",fontSize:11,textDecoration:"none"}}>
                  {c.company_website.replace(/https?:\/\/(www\.)?/,"").replace(/\/$/,"").slice(0,30)} ↗
                </a>
              : <span className="muted">—</span>}
            </td>
          </tr>;
        })}
      </tbody></table>;
    }

    /* ── Preferences Modal ── */
    function PrefsModal({prefs, allStages, allCats, onSave, onClose}) {
      const [sectors, setSectors] = useState(prefs.sectors || []);
      const [stages, setStages] = useState(prefs.stages || []);
      const [minAmt, setMinAmt] = useState(prefs.min_amount || "");
      const [maxAmt, setMaxAmt] = useState(prefs.max_amount || "");
      const toggleArr = (arr, set, v) => set(prev => prev.includes(v) ? prev.filter(x=>x!==v) : [...prev, v]);
      return <div className="modal-overlay" onClick={onClose}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <h3>My Feed Preferences</h3>
          <div className="modal-section">
            <div className="modal-section-title">Sectors</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"2px 16px"}}>
              {allCats.map(c => <label key={c}>
                <input type="checkbox" checked={sectors.includes(c)} onChange={()=>toggleArr(sectors,setSectors,c)} />
                <span style={{color:CC[c]||"#999"}}>{c}</span>
              </label>)}
            </div>
          </div>
          <div className="modal-section">
            <div className="modal-section-title">Stages</div>
            <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
              {allStages.map(s => <label key={s}>
                <input type="checkbox" checked={stages.includes(s)} onChange={()=>toggleArr(stages,setStages,s)} />
                <span style={{color:SC[s]||"#999"}}>{s}</span>
              </label>)}
            </div>
          </div>
          <div className="modal-section">
            <div className="modal-section-title">Amount Range</div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <input type="number" placeholder="Min" value={minAmt} onChange={e=>setMinAmt(e.target.value?Number(e.target.value):"")} />
              <span style={{color:"#555"}}>to</span>
              <input type="number" placeholder="Max" value={maxAmt} onChange={e=>setMaxAmt(e.target.value?Number(e.target.value):"")} />
            </div>
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:20}}>
            <button className="modal-btn modal-btn-secondary" onClick={onClose}>Cancel</button>
            <button className="modal-btn modal-btn-primary" onClick={()=>onSave({
              sectors, stages,
              ...(minAmt ? {min_amount: minAmt} : {}),
              ...(maxAmt ? {max_amount: maxAmt} : {}),
            })}>Save Preferences</button>
          </div>
        </div>
      </div>;
    }

    /* ── Login/Register Modal ── */
    function LoginModal({onSuccess, onClose}) {
      const [mode, setMode] = useState("login");
      const [username, setUsername] = useState("");
      const [password, setPassword] = useState("");
      const [displayName, setDisplayName] = useState("");
      const [error, setError] = useState("");
      const [busy, setBusy] = useState(false);
      const submit = async () => {
        setError("");
        setBusy(true);
        const url = mode === "login" ? "/auth/login" : "/auth/register";
        const body = mode === "login" ? {username, password} : {username, password, display_name: displayName || username};
        try {
          const res = await fetch(url, {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body)});
          const data = await res.json();
          if (!res.ok) { setError(data.error || "Something went wrong"); setBusy(false); return; }
          onSuccess(data.user);
        } catch(e) { setError("Network error"); setBusy(false); }
      };
      return <div className="modal-overlay" onClick={onClose}>
        <div className="modal" onClick={e=>e.stopPropagation()} style={{minWidth:340,maxWidth:380}}>
          <h3>{mode === "login" ? "Sign In" : "Create Account"}</h3>
          {error && <div style={{background:"#ef444420",border:"1px solid #ef444440",borderRadius:4,padding:"6px 10px",marginBottom:12,fontSize:11.5,color:"#f87171"}}>{error}</div>}
          <div className="modal-section">
            <div className="modal-section-title">Username</div>
            <input type="text" value={username} onChange={e=>setUsername(e.target.value)} autoFocus
              style={{width:"100%",padding:"6px 10px",borderRadius:4,border:"1px solid #1e1f35",background:"#0c0d13",color:"#ddd",fontSize:12.5,outline:"none"}}
              onKeyDown={e=>e.key==="Enter"&&submit()} />
          </div>
          {mode === "register" && <div className="modal-section">
            <div className="modal-section-title">Display Name <span style={{color:"#444",fontWeight:400}}>(optional)</span></div>
            <input type="text" value={displayName} onChange={e=>setDisplayName(e.target.value)}
              style={{width:"100%",padding:"6px 10px",borderRadius:4,border:"1px solid #1e1f35",background:"#0c0d13",color:"#ddd",fontSize:12.5,outline:"none"}}
              onKeyDown={e=>e.key==="Enter"&&submit()} />
          </div>}
          <div className="modal-section">
            <div className="modal-section-title">Password</div>
            <input type="password" value={password} onChange={e=>setPassword(e.target.value)}
              style={{width:"100%",padding:"6px 10px",borderRadius:4,border:"1px solid #1e1f35",background:"#0c0d13",color:"#ddd",fontSize:12.5,outline:"none"}}
              onKeyDown={e=>e.key==="Enter"&&submit()} />
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:20}}>
            <button className="modal-btn modal-btn-secondary" onClick={onClose}>Cancel</button>
            <button className="modal-btn modal-btn-primary" onClick={submit} disabled={busy}>
              {busy ? "..." : mode === "login" ? "Sign In" : "Create Account"}
            </button>
          </div>
          <div style={{marginTop:12,textAlign:"center",fontSize:11.5,color:"#555"}}>
            {mode === "login"
              ? <span>No account? <button className="link" onClick={()=>{setMode("register");setError("");}}>Create one</button></span>
              : <span>Already have one? <button className="link" onClick={()=>{setMode("login");setError("");}}>Sign in</button></span>}
          </div>
        </div>
      </div>;
    }

    /* ── Co-Investor Network Graph ── */
    function NetworkGraph({coinvestors, goFirm}) {
      const svgRef = useRef(null);
      const [nodes, setNodes] = useState([]);
      const [edges, setEdges] = useState([]);

      useEffect(() => {
        if (!coinvestors.length) return;
        // Build node/edge data from coinvestor pairs
        const nodeMap = {};
        const edgeList = [];
        coinvestors.slice(0, 30).forEach(c => {
          if (!nodeMap[c.firm_a]) nodeMap[c.firm_a] = {name: c.firm_a, deals: 0, x: 0, y: 0};
          if (!nodeMap[c.firm_b]) nodeMap[c.firm_b] = {name: c.firm_b, deals: 0, x: 0, y: 0};
          nodeMap[c.firm_a].deals += c.shared_deals;
          nodeMap[c.firm_b].deals += c.shared_deals;
          edgeList.push({source: c.firm_a, target: c.firm_b, weight: c.shared_deals, capital: c.shared_capital});
        });
        // Layout: circular with slight randomization
        const nodeList = Object.values(nodeMap);
        const cx = 300, cy = 200, r = 160;
        nodeList.forEach((n, i) => {
          const angle = (2 * Math.PI * i) / nodeList.length - Math.PI / 2;
          n.x = cx + r * Math.cos(angle) + (Math.random() - 0.5) * 20;
          n.y = cy + r * Math.sin(angle) + (Math.random() - 0.5) * 20;
        });
        setNodes(nodeList);
        setEdges(edgeList);
      }, [coinvestors]);

      if (!nodes.length) return null;
      const maxDeals = Math.max(...nodes.map(n => n.deals), 1);
      return <svg ref={svgRef} viewBox="0 0 600 400" style={{width:"100%",maxWidth:700,background:"#0c0d14",borderRadius:8,border:"1px solid #191a2e"}}>
        {edges.map((e, i) => {
          const s = nodes.find(n => n.name === e.source);
          const t = nodes.find(n => n.name === e.target);
          if (!s || !t) return null;
          return <line key={i} x1={s.x} y1={s.y} x2={t.x} y2={t.y}
            stroke="#7c3aed" strokeWidth={Math.max(1, e.weight * 0.8)} strokeOpacity={0.3 + e.weight * 0.1} />;
        })}
        {nodes.map((n, i) => {
          const radius = 6 + (n.deals / maxDeals) * 14;
          return <g key={i} style={{cursor:"pointer"}} onClick={() => goFirm(n.name)}>
            <circle cx={n.x} cy={n.y} r={radius} fill="#7c3aed" fillOpacity={0.6} stroke="#a78bfa" strokeWidth={1} />
            <text x={n.x} y={n.y + radius + 12} textAnchor="middle"
              fill="#888" fontSize={8} fontFamily="'IBM Plex Mono',monospace">
              {n.name.length > 18 ? n.name.slice(0, 16) + "…" : n.name}
            </text>
          </g>;
        })}
      </svg>;
    }

    /* ── Main App ── */
    function App() {
      const [deals, setDeals] = useState([]);
      const [stats, setStats] = useState(null);
      const [firms, setFirms] = useState([]);
      const [investors, setInvestors] = useState([]);
      const [portfolio, setPortfolio] = useState({companies:[], firms:[], total:0});
      const [loading, setLoading] = useState(true);
      const [view, setView] = useState("grid");
      const [selPortFirm, setSelPortFirm] = useState(null);
      const [linkedPortfolio, setLinkedPortfolio] = useState([]);
      const [velocity, setVelocity] = useState(null);
      const [coinvestors, setCoinvestors] = useState([]);
      const [followons, setFollowons] = useState([]);
      const [completeness, setCompleteness] = useState(null);
      const [insightsLoaded, setInsightsLoaded] = useState(false);
      const [q, setQ] = useState("");
      const [qBuf, setQBuf] = useState("");
      const [stgF, setStgF] = useState("All");
      const [catF, setCatF] = useState("All");
      const [monthF, setMonthF] = useState([]);
      const [monthOpen, setMonthOpen] = useState(false);
      const monthRef = useRef(null);
      const toggleMonth = m => setMonthF(prev => prev.includes(m) ? prev.filter(x=>x!==m) : [...prev, m]);
      useEffect(() => {
        if (!monthOpen) return;
        const handler = e => { if (monthRef.current && !monthRef.current.contains(e.target)) setMonthOpen(false); };
        document.addEventListener("mousedown", handler);
        return () => document.removeEventListener("mousedown", handler);
      }, [monthOpen]);
      const [sort, setSort] = useState({f:"amount_usd",d:"desc"});
      const [earlyOnly, setEarlyOnly] = useState(true);
      const [fSort, setFSort] = useState({f:"total_invested",d:"desc"});
      const [selFirm, setSelFirm] = useState(null);
      const [firmProfile, setFirmProfile] = useState(null);
      const [firmProfileLoading, setFirmProfileLoading] = useState(false);
      const [firmSubTab, setFirmSubTab] = useState("overview");
      const [selCat, setSelCat] = useState(null);
      const [expRow, setExpRow] = useState(null);
      const inpRef = useRef(null);

      /* Auth + personalization state */
      const [user, setUser] = useState(null);
      const [savedIds, setSavedIds] = useState(new Set());
      const [savedDeals, setSavedDeals] = useState([]);
      const [savedFolders, setSavedFolders] = useState([]);
      const [selFolder, setSelFolder] = useState(null);
      const [prefs, setPrefs] = useState({});
      const [showPrefs, setShowPrefs] = useState(false);
      const [showDropdown, setShowDropdown] = useState(false);
      const [showLogin, setShowLogin] = useState(false);
      const [myFeedOn, setMyFeedOn] = useState(false);
      const [timeline, setTimeline] = useState([]);
      const [sourceBreakdown, setSourceBreakdown] = useState([]);
      const [compareFirms, setCompareFirms] = useState([]);  // firm IDs for comparison
      const [compareData, setCompareData] = useState([]);
      const [selInvestor, setSelInvestor] = useState(null);
      const [investorProfile, setInvestorProfile] = useState(null);
      const [notifications, setNotifications] = useState([]);
      const [unreadCount, setUnreadCount] = useState(0);
      const [showNotifs, setShowNotifs] = useState(false);
      const [sectorTrends, setSectorTrends] = useState([]);
      const [qcAudit, setQcAudit] = useState(null);
      const [qcRejections, setQcRejections] = useState(null);
      const [verifiedData, setVerifiedData] = useState(null);

      /* Fetch data from API */
      useEffect(() => {
        Promise.all([
          fetch("/api/feed?days=9999").then(r=>r.json()),
          fetch("/api/stats").then(r=>r.json()),
          fetch("/api/firms").then(r=>r.json()),
          fetch("/api/investors?per_page=9999").then(r=>r.json()),
          fetch("/api/portfolio?per_page=9999").then(r=>r.json()),
          fetch("/api/me").then(r=>r.json()),
          fetch("/api/portfolio/linked").then(r=>r.json()),
          fetch("/api/feed/timeline").then(r=>r.json()),
          fetch("/api/deals/by-source").then(r=>r.json()),
        ]).then(([feed, st, fi, inv, port, me, linked, tl, src]) => {
          setDeals(feed.deals || []);
          setStats(st);
          setFirms(fi || []);
          setInvestors(inv.data || inv || []);
          setPortfolio({companies: port.data||port.companies||[], firms: port.firms||[], total: port.meta?.total||0});
          setLinkedPortfolio(linked || []);
          setTimeline(tl || []);
          setSourceBreakdown(src || []);
          if (me.logged_in) {
            setUser(me);
            fetch("/api/saved/ids").then(r=>r.ok?r.json():null).then(d=>{ if(d) setSavedIds(new Set(d.ids)); });
            fetch("/api/preferences").then(r=>r.ok?r.json():null).then(d=>{ if(d) setPrefs(d); });
            fetch("/api/notifications").then(r=>r.ok?r.json():null).then(d=>{ if(d) { setNotifications(d.notifications||[]); setUnreadCount(d.unread||0); }});
          }
          setLoading(false);
        }).catch(e => {
          console.error("API fetch failed:", e);
          setLoading(false);
        });
      }, []);

      /* Load saved deals when switching to saved tab or folder changes */
      useEffect(() => {
        if (view === "saved" && user) {
          const url = selFolder ? `/api/saved?folder=${encodeURIComponent(selFolder)}` : "/api/saved";
          fetch(url).then(r=>r.json()).then(d=>setSavedDeals(d.deals||[]));
          fetch("/api/saved/folders").then(r=>r.json()).then(d=>setSavedFolders(d.folders||[]));
        }
      }, [view, selFolder, user, savedIds]);

      /* Lazy-load insights data only when Insights tab is activated */
      useEffect(() => {
        if (view === "insights" && !insightsLoaded) {
          Promise.all([
            fetch("/api/deals/velocity").then(r=>r.json()),
            fetch("/api/firms/coinvestors").then(r=>r.json()),
            fetch("/api/deals/followons").then(r=>r.json()),
            fetch("/api/deals/completeness").then(r=>r.json()),
            fetch("/api/deals/sector-trends").then(r=>r.json()),
            fetch("/api/qc/audit").then(r=>r.ok?r.json():null).catch(()=>null),
            fetch("/api/qc/rejections").then(r=>r.ok?r.json():null).catch(()=>null),
          ]).then(([vel, coinv, foll, comp, trends, audit, rejections]) => {
            setVelocity(vel || null);
            setCoinvestors(coinv || []);
            setFollowons(foll || []);
            setCompleteness(comp || null);
            setSectorTrends(trends || []);
            setQcAudit(audit || null);
            setQcRejections(rejections || null);
            setInsightsLoaded(true);
          });
        }
      }, [view, insightsLoaded]);

      /* Lazy-load verified data */
      useEffect(() => {
        if (view === "verified" && !verifiedData) {
          fetch("/api/verified").then(r=>r.json()).then(d=>setVerifiedData(d)).catch(()=>{});
        }
      }, [view, verifiedData]);

      /* Toggle bookmark */
      const toggleSave = useCallback((dealId, e) => {
        if (e) e.stopPropagation();
        if (!user) { setShowLogin(true); return; }
        const isSaved = savedIds.has(dealId);
        // Optimistic update
        setSavedIds(prev => { const next = new Set(prev); isSaved ? next.delete(dealId) : next.add(dealId); return next; });
        if (isSaved) {
          fetch(`/api/saved/${dealId}`, {method:"DELETE"});
        } else {
          fetch("/api/saved", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({deal_id:dealId})});
        }
      }, [user, savedIds]);

      /* Save preferences */
      const savePrefs = useCallback((newPrefs) => {
        setPrefs(newPrefs);
        fetch("/api/preferences", {method:"PUT", headers:{"Content-Type":"application/json"}, body:JSON.stringify(newPrefs)});
        setShowPrefs(false);
      }, []);

      /* Close dropdown when clicking outside */
      useEffect(() => {
        if (!showDropdown) return;
        const h = () => setShowDropdown(false);
        setTimeout(() => document.addEventListener("click", h), 0);
        return () => document.removeEventListener("click", h);
      }, [showDropdown]);

      /* Debounce search input */
      useEffect(() => {
        const t = setTimeout(() => setQ(qBuf), 200);
        return () => clearTimeout(t);
      }, [qBuf]);

      /* Derived firm name for filters (selFirm is now an ID) */
      const selFirmName = useMemo(() => selFirm ? (firms.find(f => f.id === selFirm) || {}).name : null, [selFirm, firms]);

      /* Fetch firm profile when selFirm changes */
      useEffect(() => {
        if (!selFirm) { setFirmProfile(null); return; }
        setFirmProfileLoading(true);
        setFirmSubTab("overview");
        fetch(`/api/firms/${selFirm}/profile`)
          .then(r => r.json())
          .then(data => { setFirmProfile(data); setFirmProfileLoading(false); })
          .catch(() => setFirmProfileLoading(false));
      }, [selFirm]);

      /* Fetch investor profile when selected */
      useEffect(() => {
        if (!selInvestor) { setInvestorProfile(null); return; }
        fetch(`/api/investors/${selInvestor}`)
          .then(r => r.json())
          .then(data => setInvestorProfile(data))
          .catch(() => setInvestorProfile(null));
      }, [selInvestor]);

      /* / key focuses search */
      useEffect(() => {
        const h = e => { if (e.key === "/" && document.activeElement?.tagName !== "INPUT") { e.preventDefault(); inpRef.current?.focus(); }};
        window.addEventListener("keydown", h);
        return () => window.removeEventListener("keydown", h);
      }, []);

      const doSort = useCallback(f => setSort(p => ({f, d: p.f===f && p.d==="desc" ? "asc" : "desc"})), []);

      const exportCSV = useCallback(() => {
        const headers = ["Company","Amount","Stage","Sector","Date","Lead Investor","Source","Confidence"];
        const csvRows = [headers.join(",")];
        rows.forEach(d => {
          csvRows.push([
            `"${(d.company_name||"").replace(/"/g,'""')}"`,
            d.amount_usd||"",
            d.stage||"",
            `"${(d.category||"").replace(/"/g,'""')}"`,
            d.date_announced||"",
            `"${((d.lead_firms||[])[0]||"").replace(/"/g,'""')}"`,
            d.source_type||"",
            d.confidence_score||"",
          ].join(","));
        });
        const blob = new Blob([csvRows.join("\n")], {type:"text/csv"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = `nyc_vc_deals_${new Date().toISOString().slice(0,10)}.csv`;
        a.click(); URL.revokeObjectURL(url);
      }, [rows]);

      /* Add firm to comparison */
      const toggleCompare = useCallback((firmId) => {
        setCompareFirms(prev => {
          if (prev.includes(firmId)) return prev.filter(id => id !== firmId);
          if (prev.length >= 3) return prev; // max 3
          return [...prev, firmId];
        });
      }, []);

      /* Fetch comparison data */
      useEffect(() => {
        if (compareFirms.length < 2) { setCompareData([]); return; }
        Promise.all(compareFirms.map(id => fetch(`/api/firms/${id}/profile`).then(r=>r.json())))
          .then(data => setCompareData(data));
      }, [compareFirms]);

      /* Derived data */
      const allStages = useMemo(() => [...new Set(deals.map(d=>d.stage))].filter(Boolean).sort(), [deals]);
      const allCats = useMemo(() => [...new Set(deals.map(d=>d.category))].filter(Boolean).sort(), [deals]);
      const allMonths = useMemo(() => [...new Set(deals.map(d=>d.date_announced?.slice(0,7)).filter(Boolean))].sort().reverse(), [deals]);

      /* Filtered + sorted deals */
      const rows = useMemo(() => {
        let d = [...deals];
        if (earlyOnly) d = d.filter(x => !x.amount_usd || x.amount_usd <= 50000000);
        if (stgF !== "All") d = d.filter(x => x.stage === stgF);
        if (catF !== "All") d = d.filter(x => x.category === catF);
        if (monthF.length) d = d.filter(x => monthF.some(m => (x.date_announced||"").startsWith(m)));
        if (selFirmName) d = d.filter(x => (x.firms||[]).includes(selFirmName) || (x.lead_firms||[]).includes(selFirmName));
        /* My Feed — apply user preferences as filters */
        if (myFeedOn && prefs) {
          if (prefs.sectors && prefs.sectors.length) d = d.filter(x => prefs.sectors.includes(x.category));
          if (prefs.stages && prefs.stages.length) d = d.filter(x => prefs.stages.includes(x.stage));
          if (prefs.min_amount) d = d.filter(x => (x.amount_usd||0) >= prefs.min_amount);
          if (prefs.max_amount) d = d.filter(x => !x.amount_usd || x.amount_usd <= prefs.max_amount);
        }
        if (q) {
          const ql = q.toLowerCase();
          d = d.filter(x => (x.company_name||"").toLowerCase().includes(ql) ||
            (x.category||"").toLowerCase().includes(ql) ||
            (x.description||"").toLowerCase().includes(ql) ||
            (x.founders||"").toLowerCase().includes(ql) ||
            (x.firms||[]).some(f => f.toLowerCase().includes(ql)) ||
            (x.stage||"").toLowerCase().includes(ql));
        }
        d.sort((a,b) => {
          let va=a[sort.f], vb=b[sort.f];
          if (va==null) va = sort.d==="desc"?-Infinity:Infinity;
          if (vb==null) vb = sort.d==="desc"?-Infinity:Infinity;
          if (typeof va==="string") { va=va.toLowerCase(); vb=(vb||"").toLowerCase(); }
          return sort.d==="asc"?(va<vb?-1:va>vb?1:0):(va>vb?-1:va<vb?1:0);
        });
        return d;
      }, [deals, q, stgF, catF, monthF, sort, selFirmName, earlyOnly, myFeedOn, prefs]);

      /* Firm aggregates from deals */
      const firmAgg = useMemo(() => {
        const m = {};
        deals.forEach(d => {
          (d.firms||[]).forEach(fn => {
            if (!m[fn]) m[fn] = {name:fn,cap:0,cnt:0,leads:0,cats:new Set()};
            m[fn].cap += d.amount_usd||0;
            m[fn].cnt++;
            if ((d.lead_firms||[]).includes(fn)) m[fn].leads++;
            if (d.category) m[fn].cats.add(d.category);
          });
        });
        return Object.values(m).map(f=>({...f,cats:[...f.cats]})).sort((a,b)=>b.cap-a.cap);
      }, [deals]);

      /* Category aggregates */
      const catAgg = useMemo(() => {
        const m = {};
        deals.forEach(d => {
          const c = d.category || "Other";
          if (!m[c]) m[c] = {cat:c,cap:0,cnt:0,stages:{},firms:new Set()};
          m[c].cap += d.amount_usd||0;
          m[c].cnt++;
          m[c].stages[d.stage] = (m[c].stages[d.stage]||0)+1;
          (d.firms||[]).forEach(f => m[c].firms.add(f));
        });
        return Object.values(m).map(c=>({...c,avg:c.cap/c.cnt,firms:[...c.firms]})).sort((a,b)=>b.cap-a.cap);
      }, [deals]);

      const linkedNames = useMemo(() => {
        const m = {};
        linkedPortfolio.forEach(l => { m[l.company_name.toLowerCase()] = l; });
        return m;
      }, [linkedPortfolio]);
      const totCap = rows.reduce((s,d) => s+(d.amount_usd||0), 0);
      const activeF = [stgF!=="All"&&stgF, catF!=="All"&&catF, ...monthF, selFirmName, q].filter(Boolean);
      const clearAll = () => { setStgF("All");setCatF("All");setMonthF([]);setSelFirm(null);setFirmProfile(null);setSelCat(null);setQ("");setQBuf(""); };
      const goFirm = useCallback(n => {
        const f = firms.find(x => x.name === n);
        if (f) { setSelFirm(f.id); setView("firms"); }
      }, [firms]);

      function SH({children, field, align}) {
        const on = sort.f===field;
        return <th className={on?"active":""} onClick={field?()=>doSort(field):undefined}
          style={{textAlign:align||"left"}}>{children}{on?(sort.d==="asc"?" ↑":" ↓"):""}</th>;
      }

      if (loading) return <div className="loading"><div>Loading deal data…</div></div>;

      return (
        <div style={{display:"flex",flexDirection:"column",minHeight:"100vh"}}>
          {/* Header */}
          <div className="header">
            <div className="mono" style={{fontWeight:700,fontSize:15,color:"#eee",letterSpacing:-.5,flexShrink:0}}>
              NYC·VC <span style={{fontWeight:400,fontSize:11,color:"#444",marginLeft:6}}>Live Dashboard</span>
            </div>
            <div style={{flex:1,maxWidth:400,position:"relative"}}>
              <input ref={inpRef} value={qBuf} onChange={e=>setQBuf(e.target.value)}
                placeholder='Search everything… ( / )'
                style={{width:"100%",padding:"6px 10px 6px 28px",borderRadius:4,border:"1px solid #191a2e",background:"#101118",color:"#ddd",fontSize:12.5,outline:"none"}} />
              <span style={{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",color:"#33344a",fontSize:13}}>⌕</span>
              {qBuf && <button onClick={()=>{setQBuf("");setQ("");}} style={{position:"absolute",right:6,top:"50%",transform:"translateY(-50%)",color:"#555",fontSize:12}}>✕</button>}
            </div>
            <div style={{display:"flex",gap:1,background:"#141520",borderRadius:5,padding:2}}>
              {[{id:"grid",l:"⊞ Deals"},{id:"firms",l:"◆ Firms"},{id:"partners",l:"⊕ Partners"},{id:"categories",l:"◧ Sectors"},{id:"insights",l:"◉ Insights"},{id:"portfolio",l:"◈ Portfolio"},{id:"verified",l:"✓ Verified"},{id:"qc",l:"⊘ Quality"},
                ...(user ? [{id:"saved",l:"★ Saved"}] : [])
              ].map(t=>
                <button key={t.id} onClick={()=>{setView(t.id);if(t.id!=="firms"){setSelFirm(null);setFirmProfile(null);}setSelCat(null);if(t.id!=="portfolio")setSelPortFirm(null);if(t.id==="saved")setSelFolder(null);}}
                  className={`tab ${view===t.id?"on":""}`}>{t.l}</button>
              )}
            </div>
            <div style={{display:"flex",gap:14,marginLeft:"auto",flexShrink:0,alignItems:"center"}} className="mono">
              <div style={{textAlign:"right"}}><div style={{fontSize:9,color:"#444",fontWeight:600,letterSpacing:1,textTransform:"uppercase"}}>Showing</div>
                <div style={{fontSize:16,fontWeight:700,color:"#eee"}}>{rows.length}<span style={{fontSize:11,color:"#555"}}>/{deals.length}</span></div></div>
              <div style={{textAlign:"right"}}><div style={{fontSize:9,color:"#444",fontWeight:600,letterSpacing:1,textTransform:"uppercase"}}>Capital</div>
                <div style={{fontSize:16,fontWeight:700}} className="green">{$(totCap)}</div></div>
              <button onClick={exportCSV} className="export-btn" title="Export filtered deals to CSV">⬇ CSV</button>
            </div>
            {/* Auth UI */}
            {user ? (
              <div className="user-menu">
                <div style={{position:"relative",cursor:"pointer",marginRight:4}} onClick={e=>{e.stopPropagation();setShowNotifs(!showNotifs);}}>
                  <span style={{fontSize:16,color:unreadCount?"#f59e0b":"#555"}}>🔔</span>
                  {unreadCount > 0 && <span style={{position:"absolute",top:-4,right:-6,background:"#ef4444",color:"#fff",fontSize:8,fontWeight:700,borderRadius:6,padding:"1px 4px",minWidth:14,textAlign:"center"}}>{unreadCount}</span>}
                </div>
                {showNotifs && <div className="user-dropdown" style={{right:40,maxHeight:300,overflow:"auto",minWidth:280}}>
                  <div style={{padding:"8px 14px",borderBottom:"1px solid #1e1f35",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:11,fontWeight:700,color:"#bbb"}}>Notifications</span>
                    {unreadCount > 0 && <button onClick={()=>{fetch("/api/notifications/read",{method:"POST"});setUnreadCount(0);setNotifications(prev=>prev.map(n=>({...n,read:1})));}}
                      style={{fontSize:9,color:"#a78bfa",background:"none",border:"none",cursor:"pointer"}}>Mark all read</button>}
                  </div>
                  {notifications.length === 0 ? <div style={{padding:"16px 14px",fontSize:11,color:"#555",textAlign:"center"}}>No notifications yet</div>
                  : notifications.slice(0,20).map(n => <div key={n.id} style={{padding:"8px 14px",borderBottom:"1px solid #13141f",background:n.read?"transparent":"#7c3aed08"}}>
                    <div style={{fontSize:11,fontWeight:600,color:n.read?"#888":"#ddd"}}>{n.title}</div>
                    <div style={{fontSize:10,color:"#555",marginTop:2}}>{n.body}</div>
                    <div style={{fontSize:9,color:"#333",marginTop:2}}>{(n.created_at||"").slice(0,16)}</div>
                  </div>)}
                </div>}
                <div className="user-initial"
                  onClick={(e)=>{e.stopPropagation();setShowDropdown(!showDropdown);}}>
                  {(user.name||"U")[0].toUpperCase()}
                </div>
                {showDropdown && <div className="user-dropdown">
                  <div style={{padding:"8px 14px",borderBottom:"1px solid #1e1f35",fontSize:11,color:"#777"}}>{user.name}</div>
                  <button onClick={()=>{setShowPrefs(true);setShowDropdown(false);}}>Preferences</button>
                  <button onClick={()=>{setView("saved");setShowDropdown(false);}}>Saved Deals</button>
                  <button onClick={()=>{fetch("/auth/logout",{method:"POST"}).then(()=>{setUser(null);setSavedIds(new Set());setPrefs({});})}}>Sign Out</button>
                </div>}
              </div>
            ) : (
              <button onClick={()=>setShowLogin(true)} style={{padding:"5px 12px",borderRadius:4,background:"#1e1f35",color:"#bbb",fontSize:11.5,fontWeight:600,whiteSpace:"nowrap",border:"1px solid #2a2b3d"}}>
                Sign In
              </button>
            )}
          </div>

          {/* Filters */}
          <div className="filters">
            <span style={{fontSize:9.5,fontWeight:700,letterSpacing:1.2,textTransform:"uppercase",color:"#3d3e55"}}>Stage</span>
            {["All",...allStages].map(v=>{const on=stgF===v;const c=SC[v]||"#7c3aed";
              return <button key={v} onClick={()=>setStgF(on&&v!=="All"?"All":v)} className={`pill ${on?"on":""}`}
                style={{borderColor:on?c+"55":"#1a1b2e",background:on?c+"14":"transparent",color:on?c:"#52536b"}}>{v}</button>;})}
            <div style={{width:1,height:16,background:"#1a1b2e"}} />
            <span style={{fontSize:9.5,fontWeight:700,letterSpacing:1.2,textTransform:"uppercase",color:"#3d3e55"}}>Sector</span>
            {["All",...allCats].map(v=>{const on=catF===v;const c=CC[v]||"#7c3aed";
              return <button key={v} onClick={()=>setCatF(on&&v!=="All"?"All":v)} className={`pill ${on?"on":""}`}
                style={{borderColor:on?c+"55":"#1a1b2e",background:on?c+"14":"transparent",color:on?c:"#52536b"}}>{(v||"").split("/")[0].trim()}</button>;})}
            <div style={{width:1,height:16,background:"#1a1b2e"}} />
            <button onClick={()=>setEarlyOnly(!earlyOnly)} className={`pill ${earlyOnly?"on":""}`}
              style={{borderColor:earlyOnly?"#22c55e55":"#1a1b2e",background:earlyOnly?"#22c55e14":"transparent",color:earlyOnly?"#22c55e":"#52536b",fontWeight:earlyOnly?700:500}}>
              {earlyOnly ? "Early Stage ≤$50M" : "All Stages"}
            </button>
            <div style={{width:1,height:16,background:"#1a1b2e"}} />
            <span style={{fontSize:9.5,fontWeight:700,letterSpacing:1.2,textTransform:"uppercase",color:"#3d3e55"}}>Month</span>
            <div ref={monthRef} style={{position:"relative",display:"inline-block"}}>
              <button onClick={()=>setMonthOpen(!monthOpen)}
                style={{padding:"2px 9px",borderRadius:3,fontSize:10.5,fontWeight:monthF.length?700:500,
                  border:`1px solid ${monthF.length?"#3b82f655":"#1a1b2e"}`,
                  background:monthF.length?"#3b82f614":"transparent",
                  color:monthF.length?"#60a5fa":"#52536b",cursor:"pointer",outline:"none"}}>
                {monthF.length===0?"All Months":monthF.length===1?monthF[0]:`${monthF.length} months`}
                <span style={{marginLeft:4,fontSize:8}}>{monthOpen?"▲":"▼"}</span>
              </button>
              {monthOpen && <div style={{position:"absolute",top:"100%",left:0,marginTop:4,background:"#12131f",
                border:"1px solid #1a1b2e",borderRadius:6,padding:6,zIndex:50,maxHeight:240,overflowY:"auto",
                minWidth:140,boxShadow:"0 8px 24px rgba(0,0,0,.5)"}}>
                {monthF.length>0 && <div onClick={()=>{setMonthF([]);setMonthOpen(false);}}
                  style={{padding:"3px 8px",fontSize:10,color:"#f87171",cursor:"pointer",borderBottom:"1px solid #1a1b2e",marginBottom:4}}>
                  Clear months</div>}
                {allMonths.map(m => {
                  const on = monthF.includes(m);
                  return <div key={m} onClick={()=>toggleMonth(m)}
                    style={{padding:"3px 8px",fontSize:10.5,cursor:"pointer",borderRadius:3,display:"flex",alignItems:"center",gap:6,
                      background:on?"#3b82f614":"transparent",color:on?"#60a5fa":"#8b8ca7"}}>
                    <span style={{width:14,height:14,borderRadius:3,border:`1px solid ${on?"#3b82f6":"#2a2b3e"}`,
                      background:on?"#3b82f6":"transparent",display:"inline-flex",alignItems:"center",justifyContent:"center",
                      fontSize:9,color:"#fff",flexShrink:0}}>{on?"✓":""}</span>
                    {m}
                  </div>;
                })}
              </div>}
            </div>
            {user && (prefs.sectors?.length || prefs.stages?.length) && (
              <button onClick={()=>setMyFeedOn(!myFeedOn)} className={`pill ${myFeedOn?"on":""}`}
                style={{borderColor:myFeedOn?"#a78bfa55":"#1a1b2e",background:myFeedOn?"#a78bfa14":"transparent",color:myFeedOn?"#a78bfa":"#52536b",fontWeight:myFeedOn?700:500}}>
                My Feed
              </button>
            )}
            {activeF.length>0 && <button onClick={clearAll} style={{marginLeft:"auto",padding:"3px 10px",borderRadius:3,border:"1px solid #7c3aed30",background:"#7c3aed0c",color:"#a78bfa",fontSize:10.5,fontWeight:600}}>✕ Clear {activeF.length}</button>}
          </div>

          {/* Body */}
          <div style={{flex:1,overflow:"hidden",display:"flex"}}>

            {/* ── DEAL GRID ── */}
            {view==="grid" && <div style={{flex:1,overflow:"auto"}} className="fu">
              <table style={{fontSize:12.5}}>
                <thead><tr>
                  {user && <th style={{width:30,textAlign:"center",cursor:"default",padding:"8px 4px"}}></th>}
                  <SH field="company_name">Company</SH>
                  <SH field="amount_usd" align="right">Amount</SH>
                  <SH field="stage">Stage</SH>
                  <SH field="category">Sector</SH>
                  <SH field="date_announced">Date</SH>
                  <SH field="firms">Investors</SH>
                  <SH field="confidence_score" align="right">Conf</SH>
                  <SH>Src</SH>
                </tr></thead>
                <tbody>
                  {rows.map((d,i) => {
                    const lead = (d.lead_firms||[])[0];
                    const others = (d.firms||[]).filter(f=>f!==lead);
                    const exp = expRow===d.id;
                    return <React.Fragment key={d.id}>
                      <tr className={i%2===0?"stripe":""} onClick={()=>setExpRow(exp?null:d.id)} style={{cursor:"pointer"}}>
                        {user && <td style={{textAlign:"center",padding:"8px 4px"}}>
                          <button className="star-btn" onClick={e=>toggleSave(d.id,e)} title={savedIds.has(d.id)?"Remove bookmark":"Bookmark deal"}>
                            {savedIds.has(d.id) ? <span style={{color:"#f59e0b"}}>★</span> : <span style={{color:"#33344a"}}>☆</span>}
                          </button>
                        </td>}
                        <td><div style={{fontWeight:600,color:"#eef0f4",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:220}}>{d.company_name}</div>
                          <div style={{fontSize:10.5,color:"#4a4b60",marginTop:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:240}}>{d.description}</div></td>
                        <td style={{textAlign:"right"}} className="mono green" ><b>{$(d.amount_usd)}</b></td>
                        <td><Badge t={d.stage} c={SC[d.stage]} /></td>
                        <td><button className="link" onClick={e=>{e.stopPropagation();setCatF(catF===d.category?"All":d.category)}} style={{color:CC[d.category],fontSize:11.5,fontWeight:500}}>{d.category}</button></td>
                        <td className="mono muted" style={{fontSize:11}}>{(d.date_announced||"").slice(5)}</td>
                        <td>{(()=>{const leadPartner=(d.investors||[]).find(p=>(d.lead_firms||[]).includes(p.firm));
                          const allFirms=d.firms||[];
                          if(leadPartner) return <React.Fragment><button className="link" onClick={e=>{e.stopPropagation();setSelInvestor(leadPartner.id)}} style={{fontSize:11.5}}>★ {leadPartner.name}</button>
                            <div style={{fontSize:9.5,color:"#4a4b60"}}>{leadPartner.firm}</div></React.Fragment>;
                          if(lead) return <React.Fragment><button className="link" onClick={e=>{e.stopPropagation();goFirm(lead)}} style={{fontSize:11.5}}>★ {lead}</button>
                            {others.length>0 && <span style={{fontSize:10,color:"#4a4b60",marginLeft:4}}>+{others.length}</span>}</React.Fragment>;
                          if(allFirms.length) return <React.Fragment><button className="link" onClick={e=>{e.stopPropagation();goFirm(allFirms[0])}} style={{fontSize:11.5,color:"#8b8ca7"}}>{allFirms[0]}</button>
                            {allFirms.length>1 && <span style={{fontSize:10,color:"#4a4b60",marginLeft:4}}>+{allFirms.length-1}</span>}</React.Fragment>;
                          return <span className="muted">—</span>;
                        })()}</td>
                        <td style={{color:(d.confidence_score||0)>=.9?"#22c55e":(d.confidence_score||0)>=.7?"#f59e0b":"#ef4444",textAlign:"right",fontSize:10.5,fontFamily:"'IBM Plex Mono',monospace"}}>
                          {d.confidence_score?`${(d.confidence_score*100).toFixed(0)}%`:"—"}
                          {(() => { const cp=dealCompleteness(d); const cc=cp>=80?"#34d399":cp>=60?"#f59e0b":"#ef4444";
                            return <span title={`${cp}% complete`} style={{display:"inline-block",width:6,height:6,borderRadius:3,background:cc,marginLeft:5,verticalAlign:"middle"}} />;
                          })()}</td>
                        <td style={{textAlign:"center",fontSize:11}} title={SRCS[d.source_type]}>{srcIcon(d.source_type)}</td>
                      </tr>
                      {exp && <tr><td colSpan={user?9:8} className="expand-row"><div className="fu" style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:24,fontSize:11.5}}>
                        <div><div className="kpi-label" style={{marginBottom:5}}>Overview</div>
                          <div style={{color:"#999",lineHeight:1.6}}>{d.description}</div>
                          {d.founders && <div style={{marginTop:6,color:"#777"}}>Founded by <span style={{color:"#bbb"}}>{d.founders}</span></div>}</div>
                        <div><div className="kpi-label" style={{marginBottom:5}}>Firms</div>
                          {(d.firms||[]).map((f,j)=>{const fn=typeof f==="string"?f:f.name;const isLead=(d.lead_firms||[]).includes(fn);const isV=(d.verified_firms||[]).includes(fn);
                            return <div key={j}><button className="link" onClick={()=>goFirm(fn)} style={{fontSize:11.5,fontWeight:isLead?600:400,color:isLead?"#a78bfa":"#777"}}>{isLead?"★ ":"  "}{fn}</button>
                              {isV && <span title="Confirmed on firm website" style={{color:"#34d399",fontSize:9,marginLeft:4}}>✓ verified</span>}</div>;})}
                          {!(d.firms||[]).length && <span className="muted">Undisclosed</span>}
                          {(d.investors||[]).length>0 && <div className="kpi-label" style={{marginTop:8,marginBottom:5}}>Partners</div>}
                          {(d.investors||[]).map((p,j)=><div key={j} style={{marginBottom:2}}>
                            <button className="link" onClick={()=>setSelInvestor(p.id)} style={{fontSize:11.5,fontWeight:600,color:"#ddd"}}>{p.name}</button>
                            {p.title && <span style={{fontSize:10,color:"#555",marginLeft:4}}>{p.title}</span>}
                            {p.firm && <span style={{fontSize:10,color:"#444",marginLeft:4}}>@ {p.firm}</span>}
                          </div>)}</div>
                        <div><div className="kpi-label" style={{marginBottom:5}}>Financials</div>
                          <div style={{display:"grid",gridTemplateColumns:"80px 1fr",gap:"3px 10px"}}>
                            <span className="muted">Raised</span><span className="mono green">{d.amount_usd?`$${(d.amount_usd/1e6).toFixed(2)}M`:"—"}</span>
                            {d.total_raised && <React.Fragment><span className="muted">Lifetime</span><span className="mono" style={{color:"#888"}}>{$(d.total_raised)}</span></React.Fragment>}
                            <span className="muted">Source</span><span>{SRCS[d.source_type]||d.source_type}</span>
                          </div></div>
                      </div></td></tr>}
                    </React.Fragment>;
                  })}
                </tbody>
              </table>
              {rows.length===0 && <div className="empty" style={{padding:60}}><div>No deals match — <button className="link" onClick={clearAll}>clear filters</button></div></div>}
            </div>}

            {/* ── FIRMS ── */}
            {view==="firms" && <div style={{flex:1,display:"flex",overflow:"hidden"}} className="fu">
              {/* Left sidebar — firm list */}
              <div style={{width:400,borderRight:"1px solid #191a2e",overflow:"auto",flexShrink:0}}>
                <table style={{fontSize:11.5}}>
                  <thead><tr>
                    <th onClick={()=>setFSort(p=>({f:"name",d:p.f==="name"&&p.d==="desc"?"asc":"desc"}))} className={fSort.f==="name"?"active":""}>Firm</th>
                    <th onClick={()=>setFSort(p=>({f:"deal_count",d:p.f==="deal_count"&&p.d==="desc"?"asc":"desc"}))} className={fSort.f==="deal_count"?"active":""} style={{textAlign:"right",width:50}}>Deals</th>
                    <th onClick={()=>setFSort(p=>({f:"total_invested",d:p.f==="total_invested"&&p.d==="desc"?"asc":"desc"}))} className={fSort.f==="total_invested"?"active":""} style={{textAlign:"right",width:80}}>Capital</th>
                    <th onClick={()=>setFSort(p=>({f:"lead_count",d:p.f==="lead_count"&&p.d==="desc"?"asc":"desc"}))} className={fSort.f==="lead_count"?"active":""} style={{textAlign:"right",width:50}}>Leads</th>
                  </tr></thead>
                  <tbody>
                    {firms.filter(f=>!q||f.name.toLowerCase().includes(q.toLowerCase())).sort((a,b)=>{
                      const af=a[fSort.f],bf=b[fSort.f];
                      if(typeof af==="string") return fSort.d==="asc"?(af||"").localeCompare(bf||""):(bf||"").localeCompare(af||"");
                      return fSort.d==="asc"?((af||0)-(bf||0)):((bf||0)-(af||0));
                    }).map((f,i) => {
                      const sectors = f.focus_sectors ? (() => { try { return JSON.parse(f.focus_sectors); } catch(e) { return []; }})() : [];
                      return <tr key={f.id} onClick={()=>setSelFirm(selFirm===f.id?null:f.id)}
                        className={i%2===0?"stripe":""} style={{cursor:"pointer",background:selFirm===f.id?"#181930":undefined}}>
                        <td><div style={{display:"flex",alignItems:"center",gap:6}}>
                          <input type="checkbox" checked={compareFirms.includes(f.id)} onChange={e=>{e.stopPropagation();toggleCompare(f.id);}}
                            style={{accentColor:"#7c3aed",cursor:"pointer"}} title="Compare" />
                          <div style={{fontWeight:600,color:selFirm===f.id?"#c4b5fd":"#ddd"}}>{f.name}</div>
                        </div>
                          <div style={{display:"flex",gap:2,marginTop:3,flexWrap:"wrap",marginLeft:22}}>{sectors.slice(0,3).map(c=><Badge key={c} t={c.split("/")[0].trim()} c={CC[c]||"#666"} />)}</div></td>
                        <td className="mono" style={{textAlign:"right",fontWeight:700,color:"#ddd"}}>{f.deal_count||0}</td>
                        <td className="mono green" style={{textAlign:"right",fontWeight:700}}>{$(f.total_invested)}</td>
                        <td className="mono purple" style={{textAlign:"right"}}>{f.lead_count||0}</td>
                      </tr>;
                    })}
                  </tbody>
                </table>
              </div>

              {/* Right panel — firm profile */}
              <div style={{flex:1,overflow:"auto",padding:20}}>
                {compareFirms.length >= 2 && compareData.length >= 2 && <div style={{marginBottom:24}} className="fu">
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                    <div className="kpi-label" style={{fontSize:11}}>Firm Comparison</div>
                    <button onClick={()=>{setCompareFirms([]);setCompareData([]);}} style={{color:"#555",fontSize:10}}>✕ Clear</button>
                  </div>
                  <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                    {compareData.map(cd => <div key={cd.firm.id} className="compare-card">
                      <div style={{fontSize:14,fontWeight:700,color:"#eee",marginBottom:8}}>{cd.firm.name}</div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px 16px",fontSize:11.5}}>
                        <span className="muted">Deals</span><span className="mono" style={{color:"#eee",fontWeight:700}}>{cd.kpis.deal_count}</span>
                        <span className="muted">Capital</span><span className="mono green">{$(cd.kpis.total_invested)}</span>
                        <span className="muted">Lead Rounds</span><span className="mono purple">{cd.kpis.lead_count}</span>
                        <span className="muted">Team</span><span className="mono" style={{color:"#60a5fa"}}>{cd.kpis.team_count}</span>
                        <span className="muted">Portfolio</span><span className="mono" style={{color:"#f59e0b"}}>{cd.kpis.portfolio_count}</span>
                      </div>
                      {cd.sectors.length > 0 && <div style={{marginTop:8,display:"flex",gap:3,flexWrap:"wrap"}}>
                        {cd.sectors.slice(0,4).map(s => <Badge key={s.name} t={s.name.split("/")[0].trim()} c={CC[s.name]||"#666"} />)}
                      </div>}
                    </div>)}
                  </div>
                </div>}
                {firmProfileLoading ? (
                  <div className="empty"><div style={{color:"#52536b",fontSize:13}}>Loading profile…</div></div>
                ) : selFirm && firmProfile ? (() => {
                  const fp = firmProfile;
                  const firm = fp.firm;
                  const kpis = fp.kpis;
                  const actLabel = fp.activity.deals_last_90d > 0 ? "Active" : fp.activity.deals_last_year > 0 ? "Recent" : "Quiet";
                  const actColor = actLabel === "Active" ? "#22c55e" : actLabel === "Recent" ? "#f59e0b" : "#6b7280";
                  const focusSectors = firm.focus_sectors ? (() => { try { return JSON.parse(firm.focus_sectors); } catch(e) { return []; }})() : [];
                  const focusStages = firm.focus_stages ? (() => { try { return JSON.parse(firm.focus_stages); } catch(e) { return []; }})() : [];

                  return <div className="fu">
                    {/* Header */}
                    <div style={{marginBottom:16}}>
                      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:6}}>
                        <h2 style={{fontSize:20,fontWeight:700,color:"#eee",margin:0}}>{firm.name}</h2>
                        <Badge t={actLabel} c={actColor} />
                        {firm.website && <a href={firm.website.startsWith("http")?firm.website:"https://"+firm.website} target="_blank" rel="noopener"
                          style={{color:"#6366f1",fontSize:11,textDecoration:"none",fontWeight:500}}>
                          {firm.website.replace(/https?:\/\/(www\.)?/,"").replace(/\/$/,"").slice(0,35)} ↗
                        </a>}
                      </div>
                      {firm.description && <div style={{fontSize:12,color:"#888",marginBottom:8,maxWidth:700,lineHeight:1.5}}>{firm.description}</div>}
                      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                        {focusStages.map(s => <Badge key={s} t={s} c={SC[s]||"#888"} />)}
                        {focusSectors.map(s => <Badge key={s} t={s} c={CC[s]||"#666"} />)}
                      </div>
                    </div>

                    {/* KPIs */}
                    <KPIRow items={[
                      {l:"Deals",v:kpis.deal_count,c:"#eee"},
                      {l:"Capital",v:$(kpis.total_invested),c:"#34d399"},
                      {l:"Lead Rounds",v:kpis.lead_count,c:"#a78bfa"},
                      {l:"Team Size",v:kpis.team_count,c:"#60a5fa"},
                      {l:"Portfolio Cos",v:kpis.portfolio_count,c:"#f59e0b"},
                    ]} />

                    {/* Activity line */}
                    {fp.activity.latest_deal_date && <div style={{fontSize:10.5,color:"#555",marginBottom:14}}>
                      Latest deal: <span className="mono" style={{color:"#888"}}>{fp.activity.latest_deal_date}</span>
                      <span style={{margin:"0 8px"}}>·</span>
                      <span className="mono">{fp.activity.deals_last_90d}</span> last 90d
                      <span style={{margin:"0 8px"}}>·</span>
                      <span className="mono">{fp.activity.deals_last_year}</span> last year
                    </div>}

                    {/* Sub-tabs */}
                    <div style={{display:"flex",gap:1,background:"#141520",borderRadius:5,padding:2,marginBottom:16,width:"fit-content"}}>
                      {["overview","team","portfolio","deals"].map(t =>
                        <button key={t} onClick={()=>setFirmSubTab(t)}
                          className={`tab ${firmSubTab===t?"on":""}`} style={{fontSize:11,textTransform:"capitalize"}}>
                          {t === "overview" ? "Overview" : t === "team" ? `Team (${kpis.team_count})` : t === "portfolio" ? `Portfolio (${kpis.portfolio_count})` : `Deals (${kpis.deal_count})`}
                        </button>
                      )}
                    </div>

                    {/* ── Overview sub-tab ── */}
                    {firmSubTab === "overview" && <div className="fu">
                      {/* Sector breakdown */}
                      {fp.sectors.length > 0 && <div style={{marginBottom:20}}>
                        <div className="kpi-label" style={{marginBottom:8}}>Sector Breakdown</div>
                        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                          {fp.sectors.map(s => <div key={s.name} style={{background:"#101118",border:"1px solid #191a2e",borderRadius:5,padding:"6px 12px",display:"flex",alignItems:"center",gap:8}}>
                            <span style={{color:CC[s.name]||"#888",fontSize:12,fontWeight:600}}>{s.name}</span>
                            <span className="mono" style={{fontSize:10.5,color:"#777"}}>{s.deal_count} deals</span>
                            <span className="mono green" style={{fontSize:10.5}}>{$(s.total_invested)}</span>
                          </div>)}
                        </div>
                      </div>}

                      {/* Stage breakdown */}
                      {fp.stage_breakdown.length > 0 && <div style={{marginBottom:20}}>
                        <div className="kpi-label" style={{marginBottom:8}}>Stage Breakdown</div>
                        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                          {fp.stage_breakdown.map(s => <Badge key={s.stage} t={`${s.stage}: ${s.count}`} c={SC[s.stage]||"#888"} />)}
                        </div>
                      </div>}

                      {/* Funding timeline — companies with multiple rounds */}
                      {fp.funding_history && Object.keys(fp.funding_history).length > 0 && <div style={{marginBottom:20}}>
                        <div className="kpi-label" style={{marginBottom:8}}>Funding Timeline</div>
                        {Object.entries(fp.funding_history).map(([company, rounds]) => {
                          const sorted = [...rounds].sort((a,b) => (a.date_announced||"").localeCompare(b.date_announced||""));
                          return <div key={company} style={{background:"#101118",border:"1px solid #191a2e",borderRadius:6,padding:"10px 14px",marginBottom:6}}>
                            <div style={{fontSize:12,fontWeight:700,color:"#eee",marginBottom:6}}>{company}</div>
                            <div style={{display:"flex",gap:4,alignItems:"center",flexWrap:"wrap"}}>
                              {sorted.map((r,i) => <React.Fragment key={i}>
                                {i > 0 && <span style={{color:"#333",fontSize:11}}>→</span>}
                                <div style={{background:"#0c0d14",border:"1px solid #1e1f38",borderRadius:4,padding:"3px 10px",display:"flex",alignItems:"center",gap:6}}>
                                  <Badge t={r.stage} c={SC[r.stage]} />
                                  {r.amount_usd && <span className="mono green" style={{fontSize:11}}>{$(r.amount_usd)}</span>}
                                  {r.date_announced && <span className="mono muted" style={{fontSize:9.5}}>{r.date_announced.slice(0,7)}</span>}
                                </div>
                              </React.Fragment>)}
                            </div>
                          </div>;
                        })}
                      </div>}

                      {/* Top team preview */}
                      {fp.team.length > 0 && <div style={{marginBottom:20}}>
                        <div className="kpi-label" style={{marginBottom:8}}>Top Team Members</div>
                        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:6}}>
                          {fp.team.slice(0,5).map(t => <div key={t.id} className="investor-card" onClick={()=>setFirmSubTab("team")}>
                            <div>
                              <div style={{fontSize:12,fontWeight:600,color:"#ddd"}}>{t.name}</div>
                              <div style={{fontSize:10,color:"#555",marginTop:1}}>{t.title||"—"}</div>
                              {t.sectors.length>0 && <div style={{display:"flex",gap:2,marginTop:3,flexWrap:"wrap"}}>
                                {t.sectors.slice(0,2).map(s=><span key={s.name} style={{fontSize:8.5,padding:"1px 5px",borderRadius:2,background:(CC[s.name]||"#555")+"15",color:CC[s.name]||"#777"}}>{(s.name||"").split("/")[0].trim()}</span>)}
                              </div>}
                            </div>
                            <div className="mono" style={{fontSize:13,fontWeight:700,color:"#ddd"}}>{t.deal_count}</div>
                          </div>)}
                        </div>
                      </div>}

                      {/* Recent deals preview */}
                      {fp.deals.length > 0 && <div>
                        <div className="kpi-label" style={{marginBottom:6}}>Recent Deals</div>
                        <FirmDealTable deals={fp.deals} limit={5} />
                        {fp.deals.length > 5 && <button className="link" onClick={()=>setFirmSubTab("deals")} style={{fontSize:11,marginTop:6}}>View all {fp.deals.length} deals →</button>}
                      </div>}

                      {fp.deals.length === 0 && fp.team.length === 0 && <div style={{color:"#3d3e55",fontSize:12,padding:20,textAlign:"center"}}>No deal or team data for this firm yet</div>}
                    </div>}

                    {/* ── Team sub-tab ── */}
                    {firmSubTab === "team" && <div className="fu">
                      {fp.team.length > 0 ? (
                        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:8}}>
                          {fp.team.map(t => {
                            const hasRecent = t.sectors.length > 0;
                            return <div key={t.id} style={{background:"#101118",border:"1px solid #191a2e",borderRadius:6,padding:"12px 14px"}}>

            {/* ── PARTNERS ── */}

                </tr></thead>
                <tbody>
                  {investors.filter(p=>!q||p.name.toLowerCase().includes(q.toLowerCase())||(p.firm_name||"").toLowerCase().includes(q.toLowerCase()))
                    .filter(p=>!selFirmName||(p.firm_name||"")===selFirmName)

            {view==="categories" && <div style={{flex:1,display:"flex",overflow:"hidden"}} className="fu">
              <div style={{width:360,borderRight:"1px solid #191a2e",overflow:"auto",flexShrink:0}}>

                    <KPIRow items={[{l:"Deals",v:c.cnt,c:"#eee"},{l:"Capital",v:$(c.cap),c:"#34d399"},{l:"Avg Size",v:$(c.avg),c:"#f59e0b"},{l:"Investors",v:cfl.length,c:"#a78bfa"}]} />

                            <div style={{fontSize:9.5,color:"#555",marginTop:1}}>{f.cnt} deals · {f.leads} leads</div></div>
                          <div className="mono green" style={{fontSize:11,fontWeight:700}}>{$(f.cap)}</div>

                    <div className="kpi-label" style={{marginBottom:6}}>All {c.cat} Deals</div>
                    <table style={{fontSize:12}}><thead><tr style={{borderBottom:"2px solid #191a2e"}}>

                      return <tr key={d.id} className={i%2?"":"stripe"}>

            {/* ── INSIGHTS ── */}

                      <div className="mono" style={{fontSize:11,color:"#34d399",marginTop:2}}>{$(v.capital)}</div>

                  monthly[m].deals += t.deal_count;
                  monthly[m].capital += t.total_capital;

                const months = Object.values(monthly).sort((a,b) => a.month.localeCompare(b.month)).slice(-12);
                const maxDeals = Math.max(...months.map(m => m.deals), 1);

                return <div style={{marginBottom:24}}>

                    <div style={{display:"flex",gap:2,alignItems:"flex-end",height:120}}>
                      {months.map(m => <div key={m.month} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                        <div style={{fontSize:9,color:"#34d399",fontFamily:"'IBM Plex Mono',monospace"}}>{m.deals}</div>
                        <div style={{width:"100%",display:"flex",flexDirection:"column",justifyContent:"flex-end",height:80}}>
                          <div style={{width:"100%",background:"#7c3aed",borderRadius:"3px 3px 0 0",height:`${m.deals/maxDeals*100}%`,minHeight:2,transition:"height .3s"}} title={`${$(m.capital)} capital`} />
                        </div>
                        <div style={{fontSize:8,color:"#444",transform:"rotate(-45deg)",whiteSpace:"nowrap",marginTop:4}}>{m.month.slice(2)}</div>
                      </div>)}
                    </div>
                    <div style={{display:"flex",justifyContent:"space-between",marginTop:12,fontSize:10,color:"#555"}}>

                      <span>{$(months.reduce((s,m)=>s+m.capital,0))} capital</span>
                    </div>
                  </div>
                </div>;
              })()}

              {/* Source Quality Breakdown */}
              {sourceBreakdown.length > 0 && <div style={{marginBottom:24}}>

                    const confColor = s.avg_confidence >= 0.85 ? "#34d399" : s.avg_confidence >= 0.7 ? "#f59e0b" : "#ef4444";
                    return <div key={s.source_type} className="source-bar">
                      <span style={{width:100,fontSize:11,color:"#ddd",fontWeight:500}}>{(SRCS[s.source_type]||s.source_type||"other")}</span>
                      <div style={{flex:1,background:"#191a2e",borderRadius:3,height:6,overflow:"hidden"}}>
                        <div className="source-fill" style={{width:`${s.count/maxCount*100}%`,background:"#7c3aed"}} />

                      <span className="mono" style={{width:35,textAlign:"right",fontSize:10.5,color:"#ddd"}}>{s.count}</span>

              {/* Sector Trends */}

                sectorTrends.forEach(r => {
                  const s = r.sector || "Other";
                  sectorTotals[s] = (sectorTotals[s] || 0) + r.deal_count;
                });
                const topSectors = Object.entries(sectorTotals).sort((a,b) => b[1] - a[1]).slice(0, 5).map(e => e[0]);
                const months = [...new Set(sectorTrends.map(r => r.month))].sort().slice(-12);
                const seriesData = {};
                topSectors.forEach(s => { seriesData[s] = {}; months.forEach(m => { seriesData[s][m] = 0; }); });
                sectorTrends.forEach(r => {
                  if (topSectors.includes(r.sector) && months.includes(r.month)) {
                    seriesData[r.sector][r.month] = r.deal_count;
                  }
                });
                const maxVal = Math.max(...topSectors.flatMap(s => months.map(m => seriesData[s][m])), 1);
                const sColors = topSectors.map(s => CC[s] || "#888");
                const chartH = 120, chartW = months.length * 50;
                return <div style={{marginBottom:24}}>

                          const x = mi * 50 + 25;
                          const y = chartH - (seriesData[sector][m] / maxVal * chartH);
                          return `${x},${y}`;
                        }).join(" ");
                        return <polyline key={sector} points={points} fill="none" stroke={sColors[si]} strokeWidth={2} strokeOpacity={0.8} />;
                      })}
                      {months.map((m, mi) => <text key={m} x={mi * 50 + 25} y={chartH + 18} textAnchor="middle"

                  </div>

              })()}

              {completeness && completeness.total > 0 && <div style={{marginBottom:24}}>

                    </tr>

                </tbody></table>
              </div>}

              {/* Follow-on Rounds */}

                <div className="kpi-label" style={{marginBottom:10,fontSize:11}}>Follow-On Rounds ({followons.length} companies with multiple raises)</div>

                  <div key={i} style={{background:"#101118",border:"1px solid #191a2e",borderRadius:6,padding:"10px 14px",marginBottom:6}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                      <span style={{fontSize:12,fontWeight:700,color:"#eee"}}>{f.company_name}</span>

                    <div style={{display:"flex",gap:4,alignItems:"center",flexWrap:"wrap"}}>
                      {f.rounds.map((r,j) => <React.Fragment key={j}>

                          <Badge t={r.stage} c={SC[r.stage]} />

                      </React.Fragment>)}

                  </div>

              </div>}

              {!velocity && !coinvestors.length && !followons.length && <div className="empty" style={{padding:60}}>
                <div>{insightsLoaded ? "No insights data yet — run scrapers to populate" : "Loading insights..."}</div>
              </div>}
            </div>}

            {/* ── SAVED DEALS ── */}
            {view==="saved" && user && <div style={{flex:1,display:"flex",overflow:"hidden"}} className="fu">
              <div style={{width:220,borderRight:"1px solid #191a2e",overflow:"auto",flexShrink:0}}>
                <div style={{padding:"12px 16px",borderBottom:"1px solid #191a2e"}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:1}}>Folders</div>
                </div>
                <div onClick={()=>setSelFolder(null)} className={`sidebar-item ${!selFolder?"on":""}`}
                  style={{borderLeft:`3px solid ${!selFolder?"#a78bfa":"transparent"}`,fontSize:12}}>

                    <span style={{fontWeight:600,color:!selFolder?"#c4b5fd":"#ddd"}}>All Saved</span>
                    <span className="mono" style={{color:"#555"}}>{savedIds.size}</span>

                  <div key={f.folder} onClick={()=>setSelFolder(f.folder)} className={`sidebar-item ${selFolder===f.folder?"on":""}`}

                      <span style={{fontWeight:600,color:selFolder===f.folder?"#c4b5fd":"#ddd"}}>{f.folder}</span>

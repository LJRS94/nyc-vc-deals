                    <th style={{cursor:"default",textAlign:"right"}}>Amount</th>
                    <th style={{cursor:"default"}}>Stage</th>
                    <th style={{cursor:"default"}}>Sector</th>
                    <th style={{cursor:"default"}}>Date</th>
                    <th style={{cursor:"default"}}>Folder</th>
                    <th style={{cursor:"default"}}>Notes</th>
                  </tr></thead>
                  <tbody>
                    {savedDeals.map((d,i) =>
                      <tr key={d.id||i} className={i%2===0?"stripe":""}>
                        <td style={{textAlign:"center",padding:"8px 4px"}}>
                          <button className="star-btn" onClick={()=>toggleSave(d.deal_id)} title="Remove bookmark">
                            <span style={{color:"#f59e0b"}}>★</span>
                          </button>
                        </td>
                        <td><div style={{fontWeight:600,color:"#eef0f4"}}>{d.company_name}</div>
                          <div style={{fontSize:10.5,color:"#4a4b60",marginTop:1,maxWidth:240,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{d.company_description}</div></td>
                        <td style={{textAlign:"right"}} className="mono green"><b>{$(d.amount_usd)}</b></td>
                        <td><Badge t={d.stage} c={SC[d.stage]} /></td>
                        <td style={{color:CC[d.category],fontSize:11}}>{d.category}</td>
                        <td className="mono muted" style={{fontSize:11}}>{(d.date_announced||"").slice(5)}</td>
                        <td><span className="folder-badge">{d.folder}</span></td>
                        <td style={{color:"#666",fontSize:11,maxWidth:150,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{d.notes||"—"}</td>
                      </tr>
                    )}
                  </tbody>
                </table>
                {savedDeals.length===0 && <div className="empty" style={{padding:60}}>
                  <div><div style={{fontSize:32,marginBottom:6}}>★</div><div style={{fontSize:13}}>No saved deals yet — click ☆ on any deal to bookmark it</div></div>
                </div>}
              </div>
            </div>}

            {/* ── PORTFOLIO ── */}
            {view==="portfolio" && <div style={{flex:1,display:"flex",overflow:"hidden"}} className="fu">
              <div style={{width:340,borderRight:"1px solid #191a2e",overflow:"auto",flexShrink:0}}>
                <div style={{padding:"12px 16px",borderBottom:"1px solid #191a2e"}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:1}}>Firms ({portfolio.firms.length})</div>
                  <div style={{fontSize:10,color:"#3d3e55",marginTop:2}}>Portfolio companies scraped from VC websites</div>
                </div>
                {portfolio.firms.map(f => {
                  const on = selPortFirm === f.id;
                  const sectors = f.focus_sectors ? (() => { try { return JSON.parse(f.focus_sectors); } catch(e) { return []; }})() : [];
                  return <div key={f.id} onClick={() => setSelPortFirm(on ? null : f.id)}
                    className={`sidebar-item ${on ? "on" : ""}`} style={{borderLeft:`3px solid ${on ? "#a78bfa" : "transparent"}`}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                      <span style={{fontWeight:600,color:on?"#c4b5fd":"#ddd",fontSize:12.5}}>{f.name}</span>
                      <span className="mono purple" style={{fontSize:12,fontWeight:700}}>{f.company_count}</span>
                    </div>
                    <div style={{display:"flex",gap:2,flexWrap:"wrap"}}>
                      {sectors.slice(0,3).map(s => <span key={s} style={{fontSize:9,padding:"1px 5px",borderRadius:2,background:"#1e1f35",color:"#777"}}>{s}</span>)}
                    </div>
                  </div>;
                })}
                {portfolio.firms.length === 0 && <div className="empty" style={{padding:40,fontSize:12}}>No portfolio data yet — scraper runs Fridays 9 PM EST</div>}
              </div>
              <div style={{flex:1,overflow:"auto",padding:0}}>
                {(() => {
                  const filtered = selPortFirm
                    ? portfolio.companies.filter(c => c.firm_id === selPortFirm)
                    : portfolio.companies.filter(c => !q || (c.company_name||"").toLowerCase().includes(q.toLowerCase()) || (c.firm_name||"").toLowerCase().includes(q.toLowerCase()));
                  const firmName = selPortFirm ? (portfolio.firms.find(f=>f.id===selPortFirm)||{}).name : null;
                  return <React.Fragment>
                    {firmName && <div style={{padding:"12px 20px",borderBottom:"1px solid #191a2e",background:"#0e0f18"}}>
                      <div style={{fontSize:16,fontWeight:700,color:"#eee"}}>{firmName}</div>
                      <div style={{fontSize:11,color:"#555",marginTop:2}}>{filtered.length} portfolio companies</div>
                    </div>}
                    <PortfolioTable companies={filtered} showFirm={!selPortFirm} linkedDeals={linkedNames} />
                    {filtered.length === 0 && <div className="empty" style={{padding:60}}>
                      {portfolio.total === 0
                        ? <div>No portfolio data yet — scraper runs on Fridays at 9 PM EST</div>
                        : <div>No companies match — <button className="link" onClick={()=>{setSelPortFirm(null);setQ("");setQBuf("");}}>clear filters</button></div>}
                    </div>}
                  </React.Fragment>;
                })()}
              </div>
            </div>}

            {/* ── VERIFIED (Portfolio Verification) ── */}
            {view==="verified" && <div style={{flex:1,overflow:"auto",padding:20}} className="fu">
              {verifiedData ? <div>
                <div style={{display:"flex",gap:14,marginBottom:20,flexWrap:"wrap"}}>
                  <div className="kpi"><div className="kpi-label">Verified Links</div>
                    <div className="kpi-val mono green">{verifiedData.stats.verified_links}</div></div>
                  <div className="kpi"><div className="kpi-label">Verification Rate</div>
                    <div className="kpi-val mono" style={{color:verifiedData.stats.verification_rate>=15?"#34d399":verifiedData.stats.verification_rate>=5?"#f59e0b":"#ef4444"}}>
                      {verifiedData.stats.verification_rate}%</div></div>
                  <div className="kpi"><div className="kpi-label">Deals Verified</div>
                    <div className="kpi-val mono" style={{color:"#a78bfa"}}>{verifiedData.stats.deals_with_verification}</div></div>
                  <div className="kpi"><div className="kpi-label">Portfolio Cos</div>
                    <div className="kpi-val mono" style={{color:"#eee"}}>{verifiedData.stats.portfolio_companies.toLocaleString()}</div></div>
                  <div className="kpi"><div className="kpi-label">Portfolio Firms</div>
                    <div className="kpi-val mono" style={{color:"#eee"}}>{verifiedData.stats.portfolio_firms}</div></div>
                  <div className="kpi"><div className="kpi-label">Unverified</div>
                    <div className="kpi-val mono" style={{color:"#ef4444"}}>{verifiedData.stats.unverified_links}</div></div>
                </div>

                <div style={{marginBottom:20}}>
                  <div className="kpi-label" style={{marginBottom:8,fontSize:11}}>Firms with Verified Links</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    {verifiedData.firm_stats.map(f =>
                      <div key={f.id} style={{background:"#101118",border:"1px solid #191a2e",borderRadius:5,padding:"8px 14px",cursor:"pointer"}}
                        onClick={()=>{setSelFirm(f.id);setView("firms");}}>
                        <div style={{fontSize:11,fontWeight:600,color:"#ddd"}}>{f.name}</div>
                        <div style={{display:"flex",gap:10,marginTop:3}}>
                          <span className="mono" style={{fontSize:13,fontWeight:700,color:"#34d399"}}>{f.verified_links} <span style={{fontSize:9,color:"#555"}}>verified</span></span>
                          <span className="mono" style={{fontSize:13,color:"#555"}}>{f.total_links} <span style={{fontSize:9}}>total</span></span>
                          <span className="mono" style={{fontSize:13,color:"#444"}}>{f.portfolio_count} <span style={{fontSize:9}}>portfolio</span></span>
                        </div>
                      </div>
                    )}
                  </div>
                </div>

                <div className="kpi-label" style={{marginBottom:8,fontSize:11}}>Verified Deals ({verifiedData.verified_deals.length})</div>
                <table style={{fontSize:12}}><thead><tr style={{borderBottom:"2px solid #191a2e"}}>
                  <th style={{cursor:"default"}}>Company</th>
                  <th style={{cursor:"default",textAlign:"right"}}>Amount</th>
                  <th style={{cursor:"default"}}>Stage</th>
                  <th style={{cursor:"default"}}>Sector</th>
                  <th style={{cursor:"default"}}>Verified Firms</th>
                  <th style={{cursor:"default",textAlign:"right"}}>Conf</th>
                </tr></thead><tbody>
                  {verifiedData.verified_deals.map((d, i) =>
                    <tr key={d.deal_id} className={i%2?"":"stripe"}>
                      <td style={{fontWeight:600,color:"#eee"}}>{d.company_name}</td>
                      <td style={{textAlign:"right"}} className="mono green">{$(d.amount_usd)}</td>
                      <td><Badge t={d.stage} c={SC[d.stage]} /></td>
                      <td style={{color:CC[d.category],fontSize:11}}>{d.category||"—"}</td>
                      <td>{d.verified_firms.map((f,j)=>
                        <span key={j}>
                          <button className="link" onClick={()=>{setSelFirm(f.firm_id);setView("firms");}} style={{fontSize:11}}>{f.firm_name}</button>
                          {f.role==="lead" && <span style={{color:"#a78bfa",fontSize:9,marginLeft:2}}>lead</span>}
                          {j<d.verified_firms.length-1 && <span style={{color:"#333",margin:"0 4px"}}>·</span>}
                        </span>
                      )}</td>
                      <td className="mono" style={{color:(d.confidence_score||0)>=.85?"#34d399":"#f59e0b",textAlign:"right",fontSize:11}}>
                        {d.confidence_score?`${(d.confidence_score*100).toFixed(0)}%`:"—"}</td>
                    </tr>
                  )}
                </tbody></table>
              </div> : <div className="empty" style={{padding:60}}><div>Loading verification data...</div></div>}
            </div>}

            {/* ── DATA QUALITY ── */}
            {view==="qc" && <div style={{flex:1,overflow:"auto",padding:20}} className="fu">
              {qcAudit ? <div>
                <div style={{display:"flex",gap:14,marginBottom:20,flexWrap:"wrap"}}>
                  <div className="kpi"><div className="kpi-label">Health Score</div>
                    <div className="kpi-val mono" style={{color:qcAudit.health_score>=0.9?"#34d399":qcAudit.health_score>=0.7?"#f59e0b":"#ef4444"}}>
                      {(qcAudit.health_score*100).toFixed(0)}%
                    </div></div>
                  <div className="kpi"><div className="kpi-label">Total Deals</div><div className="kpi-val mono" style={{color:"#eee"}}>{qcAudit.total_deals}</div></div>
                  <div className="kpi"><div className="kpi-label">Issues Found</div><div className="kpi-val mono" style={{color:qcAudit.total_issues>0?"#f59e0b":"#34d399"}}>{qcAudit.total_issues}</div></div>
                </div>

                {qcAudit.issues && qcAudit.issues.length > 0 && <div style={{marginBottom:20}}>
                  <div className="kpi-label" style={{marginBottom:8,fontSize:11}}>Issues by Type</div>
                  {(() => {
                    const byType = {};
                    qcAudit.issues.forEach(iss => { byType[iss.type] = (byType[iss.type]||0) + 1; });
                    return <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                      {Object.entries(byType).sort((a,b)=>b[1]-a[1]).map(([type, count]) =>
                        <div key={type} style={{background:"#101118",border:"1px solid #191a2e",borderRadius:5,padding:"8px 14px"}}>
                          <div style={{fontSize:11,fontWeight:600,color:"#ddd"}}>{type.replace(/_/g," ")}</div>
                          <div className="mono" style={{fontSize:16,fontWeight:700,color:"#f59e0b",marginTop:2}}>{count}</div>
                        </div>
                      )}
                    </div>;
                  })()}
                </div>}

                {qcAudit.issues && qcAudit.issues.length > 0 && <div style={{marginBottom:20}}>
                  <div className="kpi-label" style={{marginBottom:8,fontSize:11}}>Recent Issues</div>
                  <table style={{fontSize:12}}><thead><tr style={{borderBottom:"2px solid #191a2e"}}>
                    <th style={{cursor:"default"}}>Type</th>
                    <th style={{cursor:"default"}}>Company</th>
                    <th style={{cursor:"default"}}>Detail</th>
                  </tr></thead><tbody>
                    {qcAudit.issues.slice(0, 30).map((iss, i) =>
                      <tr key={i} className={i%2?"":"stripe"}>
                        <td><Badge t={iss.type.replace(/_/g," ")} c="#f59e0b" /></td>
                        <td style={{fontWeight:600,color:"#ddd"}}>{iss.company_name||"—"}</td>
                        <td style={{color:"#777",fontSize:11}}>{iss.detail||"—"}</td>
                      </tr>
                    )}
                  </tbody></table>
                </div>}
              </div> : <div className="empty" style={{padding:60}}><div>{insightsLoaded ? "No QC data available" : "Loading quality data..."}</div></div>}

              {qcRejections && <div style={{marginTop:20}}>
                <div className="kpi-label" style={{marginBottom:8,fontSize:11}}>Top Rejection Patterns</div>
                {qcRejections.top_patterns && qcRejections.top_patterns.length > 0 ? <table style={{fontSize:12}}><thead><tr style={{borderBottom:"2px solid #191a2e"}}>
                  <th style={{cursor:"default"}}>Pattern</th>
                  <th style={{cursor:"default"}}>Type</th>
                  <th style={{cursor:"default",textAlign:"right"}}>Hits</th>
                  <th style={{cursor:"default"}}>Auto-Reject</th>
                </tr></thead><tbody>
                  {qcRejections.top_patterns.map((p, i) =>
                    <tr key={i} className={i%2?"":"stripe"}>
                      <td style={{fontWeight:500,color:"#ddd",maxWidth:250,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.pattern_value}</td>
                      <td style={{color:"#777"}}>{p.pattern_type}</td>
                      <td className="mono" style={{textAlign:"right",color:"#ddd"}}>{p.hit_count}</td>
                      <td>{p.auto_reject ? <Badge t="Auto" c="#ef4444" /> : <Badge t="Manual" c="#555" />}</td>
                    </tr>
                  )}
                </tbody></table> : <div className="muted" style={{padding:20,textAlign:"center",fontSize:12}}>No rejection patterns recorded</div>}
              </div>}

              {qcRejections && qcRejections.rejection_summary && <div style={{marginTop:20}}>
                <div className="kpi-label" style={{marginBottom:8,fontSize:11}}>Rejection Summary (last 30 days)</div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {Object.entries(qcRejections.rejection_summary).map(([reason, count]) =>
                    <div key={reason} style={{background:"#101118",border:"1px solid #191a2e",borderRadius:5,padding:"6px 12px"}}>
                      <div style={{fontSize:10,color:"#888"}}>{reason.replace(/_/g," ")}</div>
                      <div className="mono" style={{fontSize:14,fontWeight:700,color:"#ef4444"}}>{count}</div>
                    </div>
                  )}
                </div>
              </div>}
            </div>}
          </div>

          {/* Preferences Modal */}
          {showPrefs && user && <PrefsModal prefs={prefs} allStages={allStages} allCats={allCats} onSave={savePrefs} onClose={()=>setShowPrefs(false)} />}
          {showLogin && !user && <LoginModal onClose={()=>setShowLogin(false)} onSuccess={(u)=>{
            setUser({logged_in:true,...u});
            setShowLogin(false);
            fetch("/api/saved/ids").then(r=>r.ok?r.json():null).then(d=>{ if(d) setSavedIds(new Set(d.ids)); });
            fetch("/api/preferences").then(r=>r.ok?r.json():null).then(d=>{ if(d) setPrefs(d); });
          }} />}

          {/* Investor Profile Modal */}
          {selInvestor && investorProfile && <div className="modal-overlay" onClick={()=>setSelInvestor(null)}>
            <div className="modal" onClick={e=>e.stopPropagation()} style={{minWidth:500,maxWidth:600}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                <div>
                  <h3 style={{margin:0}}>{investorProfile.investor.name}</h3>
                  <div style={{fontSize:11,color:"#777",marginTop:2}}>{investorProfile.investor.title || "Partner"} · {investorProfile.investor.firm_name || "—"}</div>
                </div>
                <button onClick={()=>setSelInvestor(null)} style={{color:"#555",fontSize:16}}>✕</button>
              </div>
              {investorProfile.investor.linkedin_url && <a href={investorProfile.investor.linkedin_url} target="_blank" rel="noopener"
                style={{color:"#6366f1",fontSize:11,textDecoration:"none",marginBottom:12,display:"inline-block"}}>LinkedIn ↗</a>}
              <div className="kpi-label" style={{marginBottom:6}}>Deals ({investorProfile.deals.length})</div>
              {investorProfile.deals.length > 0 ? <table style={{fontSize:12}}><thead><tr style={{borderBottom:"2px solid #191a2e"}}>
                <th style={{cursor:"default"}}>Company</th>
                <th style={{cursor:"default",textAlign:"right"}}>Amount</th>
                <th style={{cursor:"default"}}>Stage</th>
                <th style={{cursor:"default"}}>Sector</th>
                <th style={{cursor:"default"}}>Date</th>
              </tr></thead><tbody>
                {investorProfile.deals.map((d,i) => <tr key={d.id} className={i%2?"":"stripe"}>
                  <td style={{fontWeight:600,color:"#eee"}}>{d.company_name}</td>
                  <td style={{textAlign:"right"}} className="mono green">{$(d.amount_usd)}</td>
                  <td><Badge t={d.stage} c={SC[d.stage]} /></td>
                  <td style={{color:CC[d.category],fontSize:11}}>{d.category||"—"}</td>
                  <td className="mono muted" style={{fontSize:10.5}}>{d.date_announced||"—"}</td>
                </tr>)}
              </tbody></table> : <div className="muted" style={{padding:20,textAlign:"center"}}>No deals linked yet</div>}
            </div>
          </div>}

          {/* Footer */}
          <div className="mono" style={{padding:"6px 20px",borderTop:"1px solid #191a2e",display:"flex",justifyContent:"space-between",background:"#0c0d13",fontSize:10,color:"#33344a",flexWrap:"wrap",gap:4}}>
            <span>{rows.length}/{deals.length} deals · {$(totCap)} · {firms.length} firms · {investors.length} partners · {portfolio.total} portfolio cos{verifiedData ? ` · ${verifiedData.stats.verified_links} verified` : ""}</span>
            <span>{stats && stats.last_updated ? `Updated ${stats.last_updated.slice(0,10)}` : ""} · AlleyWatch · SEC EDGAR · Crunchbase · News</span>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
